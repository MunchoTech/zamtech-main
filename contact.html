<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZamTech Creo | Contact</title>
<link rel="stylesheet" href="styles.css">
</head><body>

<header class="header">
  <div class="logo">ZAMTECH<span class="highlight">CREO</span></div>
  <nav class="nav"><a href="index.html">Home</a><a href="team.html">Team</a><a href="methodology.html">Methodology</a><a href="projects.html">Projects</a><a href="contact.html" class="active">Contact</a></nav>
  <div class="mobile-menu">☰</div>
</header>

<section class="hero small">
  <div class="hero-content">
    <h1>Let’s Build Together</h1>
    <p class="large-text">Have a challenge that needs AI, research, and execution? Talk to us.</p>
  </div>
</section>

<section class="section">
  <div class="container" style="max-width:700px;">
    <form action="https://formspree.io/f/your-email-here" method="POST" style="display:grid;gap:1.5rem;">
      <input type="text" name="name" placeholder="Your Name" required style="padding:1rem;border-radius:8px;border:1px solid #333;background:#111;color:white;font-size:1rem;">
      <input type="email" name="email" placeholder="Your Email" required style="padding:1rem;border-radius:8px;border:1px solid #333;background:#111;color:white;font-size:1rem;">
      <textarea name="message" rows="6" placeholder="Tell us about your challenge…" required style="padding:1rem;border-radius:8px;border:1px solid #333;background:#111;color:white;font-size:1rem;resize:vertical;"></textarea>
      <button type="submit" class="btn-primary">Send Message</button>
    </form>
  </div>
</section>

<footer class="footer"><p>© 2025 ZamTech Creo • Lusaka, Zambia</p></footer>
